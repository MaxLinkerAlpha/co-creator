<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Co-creator - 实时多语言写作工作台 (模块化版本)</title>
    <link rel="stylesheet" href="themes.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
    <script src="config.js"></script>
    <script type="module" src="src/app.js"></script>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
    <div class="theme-dots">
        <div class="theme-dot apple" onclick="UI.setTheme('theme-apple')" title="Apple极简"></div>
        <div class="theme-dot dark" onclick="UI.setTheme('theme-dark')" title="暗黑模式"></div>
        <div class="theme-dot eye" onclick="UI.setTheme('theme-eyecare')" title="护眼模式"></div>
        <div class="theme-dot roman" onclick="UI.setTheme('theme-roman')" title="罗马古典"></div>
    </div>
    <!-- 模型选择器 -->
    <div style="display:flex;align-items:center;gap:8px;margin-left:16px;flex-wrap:wrap;">
        <span style="font-size:13px;opacity:0.7;">🤖</span>
        <select id="model-select" onchange="UI.handleModelChange(this.value)" style="min-width:180px;font-size:13px;">
            <option value="Qwen3.5-4B" selected>⚡ Qwen3.5-4B · 最快响应</option>
            <option value="Qwen3.5-9B">⚖️ Qwen3.5-9B · 平衡之选</option>
            <option value="Qwen3.5-35B-A3B">🎯 Qwen3.5-35B · 专业级</option>
            <option value="Qwen2.5-7B">🆓 Qwen2.5-7B · 免费稳定</option>
            <option value="Custom">✏️ 自定义模型...</option>
        </select>
        <input type="text" id="custom-model-input" placeholder="输入模型ID，如: gpt-4o" 
               style="display:none;min-width:150px;font-size:13px;padding:4px 8px;border:1px solid var(--border-color);border-radius:var(--radius);"
               onchange="UI.setCustomModel(this.value)">
    </div>

    <button id="btn-preview" onclick="UI.toggleGlobalPreview()">👁️ 全局排版预览</button>
    <label style="display:flex;align-items:center;gap:5px;font-size:14px;cursor:pointer;">
        <input type="checkbox" id="auto-preview-toggle"> 🎭 沉浸式自动预览
    </label>
    <div style="flex:1"></div>
    <span class="status-text" id="term-status" style="margin-right:10px;">📚 未加载术语库</span>
    <label class="accent-btn" style="cursor:pointer;padding:6px 12px;border-radius:var(--radius);">
        <input type="file" id="csv-upload" accept=".csv"> 📖 导入术语库
    </label>
    <button class="accent-btn" onclick="document.getElementById('preset-modal').style.display='flex'">➕ 新增风格预设</button>
    <button class="accent-btn" onclick="UI.addTargetColumn()">➕ 添加并发目标栏</button>
</div>

<!-- 主工作区 -->
<div id="workspace" class="workspace">
    <!-- 源文本区 -->
    <div class="column source-column">
        <div class="column-header">
            <span class="column-title">📝 源文本</span>
            <span class="status-text" id="zh-status"></span>
        </div>
        <textarea id="editor-zh" class="editor" placeholder="在此输入源文本..."></textarea>
    </div>
    
    <!-- 目标语言区（动态添加） -->
    <div id="target-columns-container"></div>
</div>

<!-- 助教系统 -->
<div id="tutor-system">
    <!-- 助教 FAB -->
    <div id="tutor-fab" onclick="UI.openTutorDrawer()">
        <img id="tutor-bubble-avatar" src="assets/marcus_portrait.png" alt="Tutor">
    </div>
    
    <!-- 助教气泡 -->
    <div id="tutor-bubble" class="tutor-bubble">
        <div id="tutor-bubble-text"></div>
    </div>
    
    <!-- 助教抽屉 -->
    <div id="tutor-drawer" class="tutor-drawer">
        <div class="tutor-drawer-header">
            <h2 id="tutor-title">S.P.Q.R. - Marcus 助教</h2>
            <button onclick="UI.closeTutorDrawer()">✕</button>
        </div>
        <div class="tutor-drawer-content">
            <div id="tutor-info"></div>
            <div id="tutor-roast-content"></div>
        </div>
        <div class="tutor-drawer-footer">
            <select id="tutor-select" onchange="TutorSystem.switch(this.value); UI.updateTutorPanel(this.value);">
                <!-- 动态填充 -->
            </select>
            <select id="tutor-mode" onchange="TutorSystem.updateConfig(this.value)">
                <option value="high">高频模式</option>
                <option value="normal" selected>正常模式</option>
                <option value="low">低频模式</option>
                <option value="slow">慢写模式</option>
                <option value="manual">手动模式</option>
            </select>
            <button id="btn-roast" class="accent-btn">🔥 吐槽一下</button>
        </div>
    </div>
</div>

<!-- 预设模态框 -->
<div id="preset-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>新增风格预设</h3>
        <div class="form-group">
            <label>预设名称：</label>
            <input type="text" id="preset-name" placeholder="如：学术风格">
        </div>
        <div class="form-group">
            <label>提示词模板：</label>
            <textarea id="preset-prompt" rows="5" placeholder="使用 {{lang}} 作为目标语言占位符"></textarea>
        </div>
        <div class="modal-actions">
            <button onclick="UI.saveNewPreset()">保存</button>
            <button onclick="document.getElementById('preset-modal').style.display='none'">取消</button>
        </div>
    </div>
</div>

</body>
</html>
