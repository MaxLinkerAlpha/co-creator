<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="48" fill="#2d2d2d" stroke="#cc0000" stroke-width="2"/>
  
  <!-- 德国国旗 -->
  <rect x="15" y="35" width="70" height="10" fill="#1a1a1a"/>
  <rect x="15" y="45" width="70" height="10" fill="#cc0000"/>
  <rect x="15" y="55" width="70" height="10" fill="#ffd700"/>
  
  <!-- 中年女教授（戴眼镜） -->
  <g fill="#555">
    <!-- 头部（盘发） -->
    <ellipse cx="50" cy="38" rx="13" ry="15"/>
    <!-- 眼镜 -->
    <circle cx="45" cy="38" r="5" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="55" cy="38" r="5" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="50" y1="38" x2="50" y2="38" stroke="#333" stroke-width="2"/>
    <!-- 身体（职业装） -->
    <path d="M32 55 L68 55 L70 88 L30 88 Z"/>
    <!-- 书 -->
    <rect x="55" y="78" width="12" height="10" fill="#777"/>
  </g>
  
  <text x="50" y="25" text-anchor="middle" font-size="9" fill="#ffd700" font-family="serif">Prof.</text>
</svg>